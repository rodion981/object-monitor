send_test_notification:
  name: Emit test event
  description: Emit a test availability event for automation testing.
  fields:
    object_label:
      required: true
      selector:
        text: {}
      name: Object label
      description: Configured object label, for example home, restaurant, or cafe.
    category:
      required: false
      selector:
        text: {}
      name: Category
      description: Optional event category.
    event_type:
      required: false
      default: offline
      selector:
        select:
          options:
            - offline
            - recovery
      name: Event type
      description: Type of test event to emit.
    entity_id:
      required: false
      default: sensor.object_monitor_test
      selector:
        text: {}
      name: Entity ID
      description: Entity ID included in the test event.
    friendly_name:
      required: false
      default: Test Object Event Monitor
      selector:
        text: {}
      name: Friendly name
      description: Friendly name included in the test event.

reload_monitored_entities:
  name: Reload monitored entities
  description: Reconcile Object Event Monitor labels, current states, and stored monitor state.

clear_entity_state:
  name: Clear entity state
  description: Clear stored Object Event Monitor state for one entity.
  fields:
    entity_id:
      required: true
      selector:
        entity: {}
      name: Entity
      description: Entity whose Object Event Monitor state should be cleared.
